# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master", "dev", "stage"]

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # ENVIRONMENT ROUTING: Master -> Production
      - name: Deploy to Prod (GitHub Pages)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        id: deployment

      # ENVIRONMENT ROUTING: Dev -> dev.Yogees
      - name: Sync to Dev Repo
        if: github.ref == 'refs/heads/dev'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.ENV_DEPLOY_TOKEN }}
          branch: master
          repository: ${{ github.repository_owner }}/dev.Yogees
          force: true

      # ENVIRONMENT ROUTING: Stage -> stage.Yogees
      - name: Sync to Stage Repo
        if: github.ref == 'refs/heads/stage'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.ENV_DEPLOY_TOKEN }}
          branch: master
          repository: ${{ github.repository_owner }}/stage.Yogees
          force: true

      # ARTIFACT GENERATION (Always for Pages sites)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
