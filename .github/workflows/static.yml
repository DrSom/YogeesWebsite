# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master", "dev", "stage"]

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # ENVIRONMENT ROUTING: Dev -> dev.Yogees
      - name: Sync to Dev Repo
        if: github.ref_name == 'dev'
        run: |
          git push https://${{ secrets.ENV_DEPLOY_TOKEN }}@github.com/${{ github.repository_owner }}/dev.Yogees.git dev:master --force

      # ENVIRONMENT ROUTING: Stage -> stage.Yogees
      - name: Sync to Stage Repo
        if: github.ref_name == 'stage'
        run: |
          git push https://${{ secrets.ENV_DEPLOY_TOKEN }}@github.com/${{ github.repository_owner }}/stage.Yogees.git stage:master --force

      # ARTIFACT GENERATION (Always for Pages sites)
      - name: Setup Pages
        if: github.ref_name == 'master' || github.ref_name == 'main'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref_name == 'master' || github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # ENVIRONMENT ROUTING: Master -> Production
      - name: Deploy to Prod (GitHub Pages)
        if: github.ref_name == 'master' || github.ref_name == 'main'
        uses: actions/deploy-pages@v4
        id: deployment
